name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: '. -> target'

      - name: Install frontend dependencies
        run: npm ci

      - name: Build
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: RedRose ${{ github.ref_name }}
          releaseBody: |
            ## RedRose ${{ github.ref_name }}

            **Algorithme :** Argon2id + XChaCha20-Poly1305 + RedRose Transform

            ### Windows
            - `.exe` — installeur NSIS (recommandé)
            - `.msi` — package MSI

            ### macOS
            - `.dmg` — Intel (x86_64)
            - `.dmg` — Apple Silicon (aarch64)

            ### Linux
            - `.AppImage` — universel
            - `.deb` — Debian/Ubuntu
          releaseDraft: false
          prerelease: false
          args: --target ${{ matrix.target }}
